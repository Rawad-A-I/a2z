{% extends "base/bar_base.html" %}
{% load static %}

{% block title %}A2Z Bar - Premium Drinks & Beverages{% endblock %}

{% block content %}
<!-- Hero Section -->
<section class="hero-section">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-lg-5">
        <div class="hero-content">
          <h1 class="hero-title">
            Shop Beer, Wine & Liquor
          </h1>
          <p class="hero-subtitle">
            Then get it delivered in under 60 minutes. Boom, simple.
          </p>
          <div class="delivery-input">
            <i class="fas fa-map-marker-alt text-danger"></i>
            <input type="text" placeholder="Enter delivery address to shop" id="delivery-address">
            <button class="delivery-btn" onclick="startShopping()">
              <i class="fas fa-arrow-right"></i>
            </button>
          </div>
        </div>
      </div>
      <div class="col-lg-7">
        <div class="text-center">
          <img src="https://images.unsplash.com/photo-1513475382585-d06e58bcb0e0?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" 
               alt="Premium Drinks" 
               class="img-fluid rounded shadow-lg" 
               style="max-height: 500px; object-fit: cover;">
        </div>
      </div>
    </div>
  </div>
</section>

<!-- What'll you have? Section -->
<section class="py-5">
  <div class="container">
    <h2 class="text-center mb-5">
      <strong>What'll you have?</strong>
    </h2>
    <div class="row">
      <div class="col-lg-3 col-md-6 mb-4">
        <a href="{% url 'bar_products' %}?category=beer" class="category-card">
          <span class="category-icon">🍺</span>
          <div class="category-title">Beer</div>
        </a>
      </div>
      <div class="col-lg-3 col-md-6 mb-4">
        <a href="{% url 'bar_products' %}?category=wine" class="category-card">
          <span class="category-icon">🍷</span>
          <div class="category-title">Wine</div>
        </a>
      </div>
      <div class="col-lg-3 col-md-6 mb-4">
        <a href="{% url 'bar_products' %}?category=liquor" class="category-card">
          <span class="category-icon">🥃</span>
          <div class="category-title">Liquor</div>
        </a>
      </div>
      <div class="col-lg-3 col-md-6 mb-4">
        <a href="{% url 'bar_products' %}?category=extras" class="category-card">
          <span class="category-icon">🧊</span>
          <div class="category-title">Extras</div>
        </a>
      </div>
    </div>
  </div>
</section>

<script>
function startShopping() {
  const address = document.getElementById('delivery-address').value;
  if (address.trim()) {
    // Store address in session or redirect to products with address
    window.location.href = "{% url 'bar_products' %}?address=" + encodeURIComponent(address);
  } else {
    alert('Please enter a delivery address to continue shopping.');
  }
}

// Allow Enter key to trigger shopping
document.getElementById('delivery-address').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    startShopping();
  }
});
</script>
{% endblock %}
