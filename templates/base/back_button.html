{% comment %}
Universal back button component
Usage: {% include 'base/back_button.html' with back_url='url_name' back_text='Back Text' %}
{% endcomment %}

{% if back_url %}
<div class="row mb-3">
    <div class="col-12">
        <a href="{% url back_url %}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-2"></i>{{ back_text|default:"Back" }}
        </a>
    </div>
</div>
{% endif %}
