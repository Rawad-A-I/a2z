{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=no" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>{% block title %}Home | Django Ecommerce Site{% endblock %}</title>

    <link rel="shortcut icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}" />

    <!-- Bootstrap CSS -->
    <link href="/media/css/bootstrap.css" rel="stylesheet" type="text/css" />

    <!-- Font Awesome -->
    <link href="/media/fonts/fontawesome/css/all.min.css" type="text/css" rel="stylesheet" />

    <!-- Custom Styles -->
    <link href="/media/css/ui.css" rel="stylesheet" type="text/css" />
    <link href="/media/css/responsive.css" rel="stylesheet" />
    <link href="{% static 'css/mobile-responsive.css' %}" rel="stylesheet" />
    <link href="/media/css/footer.css" rel="stylesheet" type="text/css" />
    <link href="/media/css/register.css" rel="stylesheet" type="text/css" />
    <link href="/media/css/contact.css" rel="stylesheet" type="text/css" />
    <link href="https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.lineicons.com/3.0/lineicons.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" />

    <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

    <!-- Popper.js -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JavaScript -->
    <script src="/media/js/script.js" type="text/javascript"></script>
    
    <!-- Modern Interactive Features -->
    <script>
      // Smooth scrolling for anchor links
      document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
          e.preventDefault();
          const target = document.querySelector(this.getAttribute('href'));
          if (target) {
            target.scrollIntoView({
              behavior: 'smooth',
              block: 'start'
            });
          }
        });
      });

      // Add loading animation to product cards
      document.addEventListener('DOMContentLoaded', function() {
        const cards = document.querySelectorAll('.card-product-grid');
        cards.forEach((card, index) => {
          card.style.opacity = '0';
          card.style.transform = 'translateY(30px)';
          
          setTimeout(() => {
            card.style.transition = 'all 0.6s ease';
            card.style.opacity = '1';
            card.style.transform = 'translateY(0)';
          }, index * 100);
        });
      });

      // Add hover effects to navigation
      document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('mouseenter', function() {
          this.style.transform = 'translateY(-2px)';
        });
        
        link.addEventListener('mouseleave', function() {
          this.style.transform = 'translateY(0)';
        });
      });

      // Add parallax effect to hero section
      window.addEventListener('scroll', function() {
        const scrolled = window.pageYOffset;
        const hero = document.querySelector('.hero-section');
        if (hero) {
          hero.style.transform = `translateY(${scrolled * 0.5}px)`;
        }
      });

      // Add click animation to buttons
      document.querySelectorAll('.btn').forEach(button => {
        button.addEventListener('click', function(e) {
          const ripple = document.createElement('span');
          const rect = this.getBoundingClientRect();
          const size = Math.max(rect.width, rect.height);
          const x = e.clientX - rect.left - size / 2;
          const y = e.clientY - rect.top - size / 2;
          
          ripple.style.width = ripple.style.height = size + 'px';
          ripple.style.left = x + 'px';
          ripple.style.top = y + 'px';
          ripple.classList.add('ripple');
          
          this.appendChild(ripple);
          
          setTimeout(() => {
            ripple.remove();
          }, 600);
        });
      });

      // Add CSS for ripple effect
      const style = document.createElement('style');
      style.textContent = `
        .btn {
          position: relative;
          overflow: hidden;
        }
        
        .ripple {
          position: absolute;
          border-radius: 50%;
          background: rgba(255, 255, 255, 0.3);
          transform: scale(0);
          animation: ripple-animation 0.6s linear;
          pointer-events: none;
        }
        
        @keyframes ripple-animation {
          to {
            transform: scale(4);
            opacity: 0;
          }
        }
      `;
      document.head.appendChild(style);
    </script>
  </head>

  <style>
    /* Base responsive styles */
    a {
      text-decoration: none;
    }
    
    /* Ensure proper box-sizing */
    *, *::before, *::after {
      box-sizing: border-box;
    }
    
    /* Body responsive */
    body {
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }
    
    /* Container responsive */
    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 15px;
    }
    
    /* Desktop optimizations */
    @media (min-width: 1200px) {
      .container {
        max-width: 1140px;
      }
      
      .row {
        margin: 0 -15px;
      }
      
      .col-lg-1, .col-lg-2, .col-lg-3, .col-lg-4, .col-lg-5, .col-lg-6,
      .col-lg-7, .col-lg-8, .col-lg-9, .col-lg-10, .col-lg-11, .col-lg-12 {
        padding: 0 15px;
      }
    }
    
    /* Tablet optimizations */
    @media (min-width: 768px) and (max-width: 1199px) {
      .container {
        max-width: 100%;
        padding: 0 20px;
      }
      
      .card {
        margin-bottom: 1.5rem;
      }
      
      .btn-group {
        flex-wrap: wrap;
      }
    }
    
    /* Mobile optimizations */
    @media (max-width: 767px) {
      body {
        font-size: 14px;
      }
      
      .container {
        padding: 0 10px;
      }
      
      .card {
        margin-bottom: 1rem;
      }
      
      .btn {
        padding: 0.5rem 1rem;
        font-size: 0.9rem;
      }
      
      .table-responsive {
        border: none;
      }
      
      .table-responsive table {
        margin-bottom: 0;
      }
    }
    
    /* Extra small devices */
    @media (max-width: 575px) {
      .container {
        padding: 0 5px;
      }
      
      .card-body {
        padding: 0.75rem;
      }
      
      .btn {
        padding: 0.4rem 0.8rem;
        font-size: 0.85rem;
      }
    }
    
    /* Clean card styling */
    .card {
      border: 1px solid #e9ecef;
      border-radius: 0.5rem;
      box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
    }
    
    .card-body {
      position: relative;
      background: #fff;
      border-radius: 0.5rem;
    }
    
    /* Order management specific styling */
    .order-management-container {
      background: #f8f9fa;
      min-height: 100vh;
    }
    
    .order-card {
      background: #fff;
      border: 1px solid #e9ecef;
      border-radius: 0.5rem;
      box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
      transition: box-shadow 0.15s ease-in-out;
    }
    
    .order-card:hover {
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
    }

    /* Modern Premium Design */
    :root {
      --primary-color: #667eea;
      --secondary-color: #764ba2;
      --accent-color: #f093fb;
      --success-color: #4facfe;
      --warning-color: #ffecd2;
      --danger-color: #ff6b6b;
      --dark-color: #2d3748;
      --light-color: #f7fafc;
      --border-radius: 20px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      --shadow-hover: 0 20px 40px rgba(0, 0, 0, 0.15);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      color: var(--dark-color);
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
    }

    /* Modern Navigation */
    .navbar {
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.95) !important;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
    }

    .navbar-brand {
      font-weight: 800;
      font-size: 1.8rem;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-link {
      font-weight: 600;
      color: var(--dark-color) !important;
      transition: all 0.3s ease;
      position: relative;
    }

    .nav-link:hover {
      color: var(--primary-color) !important;
      transform: translateY(-2px);
    }

    .nav-link::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -5px;
      left: 50%;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      transition: all 0.3s ease;
      transform: translateX(-50%);
    }

    .nav-link:hover::after {
      width: 100%;
    }

    /* Enhanced Product Cards */
    .card-product-grid {
      border: none;
      border-radius: var(--border-radius);
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      background: white;
      position: relative;
    }

    .card-product-grid::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card-product-grid:hover::after {
      opacity: 1;
    }

    .card-product-grid:hover {
      transform: translateY(-12px) scale(1.03);
      box-shadow: var(--shadow-hover);
    }

    .img-wrap {
      position: relative;
      overflow: hidden;
      border-radius: var(--border-radius) var(--border-radius) 0 0;
    }

    .img-wrap img {
      transition: transform 0.6s ease;
      width: 100%;
      height: 280px;
      object-fit: cover;
    }

    .card-product-grid:hover .img-wrap img {
      transform: scale(1.15);
    }

    .info-wrap {
      padding: 25px;
      background: white;
      position: relative;
      z-index: 2;
    }

    .info-wrap .title {
      color: var(--dark-color);
      font-weight: 700;
      font-size: 1.2rem;
      margin-bottom: 12px;
      text-decoration: none;
      transition: color 0.3s ease;
      line-height: 1.4;
    }

    .info-wrap .title:hover {
      color: var(--primary-color);
      text-decoration: none;
    }

    .price {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--success-color), #00d4aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 15px;
    }

    /* Modern Buttons */
    .btn {
      border-radius: 50px;
      padding: 12px 30px;
      font-weight: 600;
      transition: all 0.3s ease;
      border: none;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: white;
    }

    .btn-success {
      background: linear-gradient(135deg, var(--success-color), #00d4aa);
      color: white;
    }

    /* Enhanced Badges */
    .badge {
      border-radius: 25px;
      padding: 8px 16px;
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-danger {
      background: linear-gradient(135deg, #ff6b6b, #ee5a24);
      color: white;
    }

    .badge-warning {
      background: linear-gradient(135deg, #ffc107, #ff8c00);
      color: white;
    }

    .badge-success {
      background: linear-gradient(135deg, #28a745, #20c997);
      color: white;
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in-up {
      animation: fadeInUp 0.6s ease forwards;
    }

    /* Loading States */
    .loading {
      position: relative;
      overflow: hidden;
    }

    .loading::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      animation: loading 1.5s infinite;
    }

    @keyframes loading {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    /* Hero Section */
    .hero-section {
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
      color: white;
      padding: 80px 0;
      position: relative;
      overflow: hidden;
    }

    .hero-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="50" cy="50" r="1" fill="rgba(255,255,255,0.1)"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
      opacity: 0.1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
    }

    .hero-title {
      font-size: 3.5rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
      text-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .hero-subtitle {
      font-size: 1.3rem;
      margin-bottom: 2rem;
      opacity: 0.9;
    }

    .btn-outline-light {
      border: 2px solid rgba(255, 255, 255, 0.3);
      color: white;
      background: transparent;
      backdrop-filter: blur(10px);
    }

    .btn-outline-light:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.5);
      color: white;
    }

    /* Mobile Optimizations */
    @media (max-width: 768px) {
      .hero-title {
        font-size: 2.5rem;
      }
      
      .card-product-grid:hover {
        transform: translateY(-5px) scale(1.01);
      }
      
      .btn {
        padding: 10px 20px;
        font-size: 0.9rem;
      }
    }
  </style>
  <body>
    {% include 'home/navbar.html' %}
    {% block start %} {% endblock %}
    {% include 'home/footer.html' %}
  </body>
</html>
