<div class="settings-form">
    <form id="personal-info-form" class="space-y-6">
        {% csrf_token %}

        <!-- Profile Picture Section -->
        <div class="flex items-center space-x-6">
            <div class="relative">
                <div class="w-20 h-20 rounded-full bg-gray-200 flex items-center justify-center overflow-hidden">
                    {% if user.profile.profile_image %}
                        <img id="profile-preview" src="{{ user.profile.profile_image.url }}" alt="Profile" class="w-full h-full object-cover">
                    {% else %}
                        <i class="fas fa-user text-gray-400 text-2xl"></i>
                    {% endif %}
                </div>
                <button type="button" onclick="document.getElementById('profile-upload').click()"
                        class="absolute bottom-0 right-0 w-6 h-6 bg-blue-600 text-white rounded-full flex items-center justify-center hover:bg-blue-700">
                    <i class="fas fa-camera text-xs"></i>
                </button>
                <input type="file" id="profile-upload" name="profile_picture" accept="image/*" class="hidden" onchange="previewProfilePicture(this)">
            </div>
            <div>
                <h4 class="text-sm font-medium text-gray-900">Profile Picture</h4>
                <p class="text-sm text-gray-500">Upload a new profile picture. JPG, PNG up to 2MB.</p>
            </div>
        </div>

        <!-- Name Fields -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label for="first_name" class="block text-sm font-medium text-gray-700">First Name</label>
                <input type="text" id="first_name" name="first_name" value="{{ user.first_name|default:'' }}"
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>
            <div>
                <label for="last_name" class="block text-sm font-medium text-gray-700">Last Name</label>
                <input type="text" id="last_name" name="last_name" value="{{ user.last_name|default:'' }}"
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>
        </div>

        <!-- Email Field -->
        <div>
            <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
            <div class="mt-1 relative rounded-md shadow-sm">
                <input type="email" id="email" name="email" value="{{ user.email }}"
                       class="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 pr-10">
                <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                    <button type="button" onclick="showEmailVerification()" class="text-blue-600 hover:text-blue-900 text-sm">
                        {% if user.email_verified %}Verified{% else %}Verify{% endif %}
                    </button>
                </div>
            </div>
        </div>

        <!-- Phone Field -->
        <div>
            <label for="phone" class="block text-sm font-medium text-gray-700">Phone Number</label>
            <div class="mt-1 relative rounded-md shadow-sm">
                <input type="tel" id="phone" name="phone" value="{{ user.phone|default:'' }}"
                       class="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 pr-20">
                <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                    <button type="button" onclick="verifyPhone()" class="text-blue-600 hover:text-blue-900 text-sm">
                        {% if user.phone_verified %}Verified{% else %}Verify{% endif %}
                    </button>
                </div>
            </div>
        </div>

        <!-- Form Actions -->
        <div class="flex justify-end space-x-3 pt-6 border-t border-gray-200">
            <button type="button" onclick="resetPersonalInfoForm()" class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50">
                Cancel
            </button>
            <button type="submit" class="px-4 py-2 bg-blue-600 border border-transparent rounded-md text-sm font-medium text-white hover:bg-blue-700">
                Save Changes
            </button>
        </div>
    </form>
</div>
