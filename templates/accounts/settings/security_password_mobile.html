<div class="space-y-4">
    <!-- Password Status -->
    <div class="flex justify-between items-center p-4 bg-white border border-gray-200 rounded-lg">
        <div class="flex items-center">
            <i class="fas fa-lock text-green-600 mr-3"></i>
            <span class="text-sm font-medium text-gray-700">Password</span>
        </div>
        <span class="text-sm text-gray-500">Last changed 30 days ago</span>
    </div>

    <!-- 2FA Status -->
    <div class="flex justify-between items-center p-4 bg-white border border-gray-200 rounded-lg">
        <div class="flex items-center">
            <i class="fas fa-shield-alt text-gray-600 mr-3"></i>
            <span class="text-sm font-medium text-gray-700">Two-Factor Authentication</span>
        </div>
        {% if user.two_factor_enabled %}
            <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">
                <i class="fas fa-check-circle mr-1"></i>Enabled
            </span>
        {% else %}
            <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-800">
                <i class="fas fa-times-circle mr-1"></i>Disabled
            </span>
        {% endif %}
    </div>

    <!-- Active Sessions -->
    <div class="bg-white border border-gray-200 rounded-lg">
        <div class="p-4 border-b border-gray-200">
            <h4 class="text-sm font-medium text-gray-900">Active Sessions</h4>
        </div>
        <div class="divide-y divide-gray-200">
            <div class="p-4">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-900">Current Session</p>
                        <p class="text-xs text-gray-500">Chrome on Windows • Active now</p>
                    </div>
                    <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">
                        Current
                    </span>
                </div>
            </div>
            <div class="p-4">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-900">Mobile App</p>
                        <p class="text-xs text-gray-500">iPhone • 2 hours ago</p>
                    </div>
                    <button onclick="logoutSession(2)" class="text-red-600 hover:text-red-900 text-sm font-medium">
                        Logout
                    </button>
                </div>
            </div>
            <div class="p-4">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-900">Work Computer</p>
                        <p class="text-xs text-gray-500">Chrome on macOS • Yesterday</p>
                    </div>
                    <button onclick="logoutSession(3)" class="text-red-600 hover:text-red-900 text-sm font-medium">
                        Logout
                    </button>
                </div>
            </div>
        </div>
        <div class="p-4 border-t border-gray-200">
            <button onclick="logoutAllSessions()" class="w-full py-2 bg-red-600 text-white rounded-lg font-medium hover:bg-red-700">
                Logout from all devices
            </button>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="space-y-2">
        <button onclick="openEditModal('change-password')" class="w-full py-3 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700">
            Change Password
        </button>
        <button onclick="toggle2FA()" class="w-full py-3 border border-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-50">
            {% if user.two_factor_enabled %}Disable 2FA{% else %}Enable 2FA{% endif %}
        </button>
    </div>
</div>
